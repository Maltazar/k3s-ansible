---
extra_server_args: ""

k3s_kubectl_binary: k3s kubectl

group_name_master: master

kube_vip_arp: true
kube_vip_iface:
kube_vip_image_repository: ghcr.io/kube-vip/kube-vip
# RBAC manifest (override for air-gapped installs). Default tracks kube-vip.io docs.
kube_vip_rbac_manifest_url: https://kube-vip.io/manifests/rbac.yaml
# Re-apply RBAC when k3s_server_post reconciles the kube-vip DaemonSet image (set false if RBAC is managed elsewhere).
kube_vip_apply_rbac_on_reconcile: true
kube_vip_cloud_provider_tag_version: v0.0.12
# Optional full URL override; default builds from tag below.
kube_vip_cloud_provider_manifest_url: ""
kube_vip_tag_version: v1.1.2

kube_vip_bgp: false
kube_vip_bgp_routerid: 127.0.0.1
kube_vip_bgp_as: "64513"
kube_vip_bgp_peeraddress: 192.168.30.1
kube_vip_bgp_peeras: "64512"

kube_vip_bgp_peers: []
kube_vip_bgp_peers_groups: ['k3s_master']

metal_lb_controller_tag_version: v0.14.3
metal_lb_speaker_tag_version: v0.14.3
metal_lb_type: native

retry_count: 20

# yamllint disable rule:line-length
server_init_args: >-
  {% if groups[group_name_master | default('master')] | length > 1 %}
    {% if ansible_hostname == hostvars[groups[group_name_master | default('master')][0]]['ansible_hostname'] %}
      --cluster-init
    {% else %}
      --server https://{{ hostvars[groups[group_name_master | default('master')][0]].k3s_node_ip | split(",") | first | ansible.utils.ipwrap }}:6443
    {% endif %}
    --token {{ k3s_token }}
  {% endif %}
  {{ extra_server_args }}

systemd_dir: /etc/systemd/system
