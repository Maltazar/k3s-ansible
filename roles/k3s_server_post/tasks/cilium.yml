---
- name: Prepare Cilium CLI on first master and deploy CNI
  when: ansible_hostname == hostvars[groups[group_name_master | default('master')][0]]['ansible_hostname']
  run_once: true
  block:

    # Gateway API v1.5+ ships ValidatingAdmissionPolicy safe-upgrades.gateway.networking.k8s.io
    # with standard CRDs; it rejects applying experimental-install atop standard. Remove it first,
    # apply experimental then standard so both bundles succeed and the policy is re-applied last.
    # See https://github.com/kubernetes-sigs/gateway-api/releases/tag/v1.5.0 (Breaking Changes).
    - name: Remove Gateway API safe-upgrades ValidatingAdmissionPolicy binding
      when: kube_proxy_replacement
      ansible.builtin.command: >-
        {{ k3s_kubectl_binary | default('k3s kubectl') }} delete validatingadmissionpolicybinding safe-upgrades.gateway.networking.k8s.io --ignore-not-found
      register: gw_api_safe_upgrades_binding_delete
      changed_when: "'deleted' in (gw_api_safe_upgrades_binding_delete.stdout | default(''))"

    - name: Remove Gateway API safe-upgrades ValidatingAdmissionPolicy
      when: kube_proxy_replacement
      ansible.builtin.command: >-
        {{ k3s_kubectl_binary | default('k3s kubectl') }} delete validatingadmissionpolicy safe-upgrades.gateway.networking.k8s.io --ignore-not-found
      register: gw_api_safe_upgrades_policy_delete
      changed_when: "'deleted' in (gw_api_safe_upgrades_policy_delete.stdout | default(''))"

    - name: Deploy Gateway API CRDs experimental
      when: kube_proxy_replacement
      ansible.builtin.command: >-
        {{ k3s_kubectl_binary | default('k3s kubectl') }} apply --server-side -f https://github.com/kubernetes-sigs/gateway-api/releases/download/{{ cilium_gateway_crd_versions }}/experimental-install.yaml

    - name: Deploy Gateway API CRDs
      when: kube_proxy_replacement
      ansible.builtin.command: >-
        {{ k3s_kubectl_binary | default('k3s kubectl') }} apply --server-side -f https://github.com/kubernetes-sigs/gateway-api/releases/download/{{ cilium_gateway_crd_versions }}/standard-install.yaml

    - name: Create tmp directory on first master
      ansible.builtin.file:
        path: /tmp/k3s
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Fail on unsupported control-plane architecture for Cilium CLI and Helm binaries
      ansible.builtin.fail:
        msg: >-
          Cilium role downloads linux-amd64 or linux-arm64 Cilium CLI and Helm only.
          This host reports ansible_architecture={{ ansible_architecture }} (e.g. armv7l is not supported).
          Run from an amd64/aarch64 first master or mirror binaries yourself.
      when: ansible_architecture not in ['x86_64', 'aarch64', 'amd64']

    - name: Check if Cilium CLI is installed
      ansible.builtin.command: cilium version
      register: cilium_cli_installed
      failed_when: false
      changed_when: false
      ignore_errors: true

    - name: Check for Cilium CLI version in command output
      ansible.builtin.set_fact:
        installed_cli_version: >-
          {{
            cilium_cli_installed.stdout_lines
            | join(' ')
            | regex_findall('cilium-cli: (v\d+\.\d+\.\d+)')
            | first
            | default('unknown')
          }}
      when: cilium_cli_installed.rc == 0

    - name: Get latest stable Cilium CLI version file
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/cilium/cilium-cli/main/stable.txt
        dest: /tmp/k3s/cilium-cli-stable.txt
        owner: root
        group: root
        mode: "0755"

    - name: Read Cilium CLI stable version from file
      ansible.builtin.command: cat /tmp/k3s/cilium-cli-stable.txt
      register: cli_ver
      changed_when: false

    - name: Log installed Cilium CLI version
      ansible.builtin.debug:
        msg: "Installed Cilium CLI version: {{ installed_cli_version | default('Not installed') }}"

    - name: Log latest stable Cilium CLI version
      ansible.builtin.debug:
        msg: "Latest stable Cilium CLI version: {{ cli_ver.stdout }}"

    - name: Determine if Cilium CLI needs installation or update
      ansible.builtin.set_fact:
        cilium_cli_needs_update: >-
          {{
            cilium_cli_installed.rc != 0 or
            (cilium_cli_installed.rc == 0 and
            installed_cli_version != cli_ver.stdout)
          }}

    - name: Install or update Cilium CLI
      when: cilium_cli_needs_update
      block:
        - name: Set architecture variable
          ansible.builtin.set_fact:
            cli_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"

        - name: Download Cilium CLI and checksum
          ansible.builtin.get_url:
            url: "{{ cilium_base_url }}/cilium-linux-{{ cli_arch }}{{ item }}"
            dest: /tmp/k3s/cilium-linux-{{ cli_arch }}{{ item }}
            owner: root
            group: root
            mode: "0755"
          loop:
            - .tar.gz
            - .tar.gz.sha256sum
          vars:
            cilium_base_url: https://github.com/cilium/cilium-cli/releases/download/{{ cli_ver.stdout }}

        - name: Verify the downloaded tarball
          ansible.builtin.shell: |
            cd /tmp/k3s && sha256sum --check cilium-linux-{{ cli_arch }}.tar.gz.sha256sum
          args:
            executable: /bin/bash
          changed_when: false

        - name: Extract Cilium CLI to /usr/local/bin
          ansible.builtin.unarchive:
            src: /tmp/k3s/cilium-linux-{{ cli_arch }}.tar.gz
            dest: /usr/local/bin
            remote_src: true

        - name: Remove downloaded tarball and checksum file
          ansible.builtin.file:
            path: "{{ item }}"
            state: absent
          loop:
            - /tmp/k3s/cilium-linux-{{ cli_arch }}.tar.gz
            - /tmp/k3s/cilium-linux-{{ cli_arch }}.tar.gz.sha256sum

    - name: Wait for connectivity to kube VIP
      ansible.builtin.command: ping -c 1 {{ apiserver_endpoint }}
      register: ping_result
      until: ping_result.rc == 0
      retries: 21
      delay: 1
      ignore_errors: true
      changed_when: false

    - name: Fail if kube VIP not reachable
      ansible.builtin.fail:
        msg: API endpoint {{ apiserver_endpoint }} is not reachable
      when: ping_result.rc != 0

    - name: Test for existing Cilium install
      ansible.builtin.command: |
        {{ k3s_kubectl_binary | default('k3s kubectl') }} -n kube-system get daemonsets cilium
      register: cilium_installed
      failed_when: false
      changed_when: false
      ignore_errors: true

    - name: Set initial Cilium state facts
      ansible.builtin.set_fact:
        cilium_present: "{{ cilium_installed.rc == 0 }}"
        installed_cilium_version: ""
        cilium_needs_update: "{{ cilium_installed.rc != 0 }}"
        cilium_is_upgrade: false

    - name: Refresh Cilium version from cluster when present
      when: cilium_present
      block:
        - name: Check Cilium version
          ansible.builtin.command: cilium version
          register: cilium_version
          failed_when: false
          changed_when: false
          ignore_errors: true

        # DaemonSet image is authoritative. `cilium version` lists (default) before (running); joining
        # lines and matching the first "cilium image...X.Y.Z" captures (default) and mis-reports upgrades.
        - name: Get Cilium agent image reference from DaemonSet
          ansible.builtin.shell: |
            set -euo pipefail
            K="{{ k3s_kubectl_binary | default('k3s kubectl') }}"
            img="$($K -n kube-system get daemonset cilium \
              -o jsonpath='{.spec.template.spec.containers[?(@.name=="cilium")].image}' 2>/dev/null || true)"
            if [ -z "$img" ]; then
              img="$($K -n kube-system get daemonset cilium \
                -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || true)"
            fi
            printf '%s' "$img"
          args:
            executable: /bin/bash
          register: cilium_ds_cilium_image
          changed_when: false
          failed_when: false

        # Prefer (running) over (default) / stable when falling back to CLI text.
        - name: Parse installed Cilium version
          ansible.builtin.set_fact:
            installed_cilium_version: >-
              {{
                (
                  cilium_ds_cilium_image.stdout | default('') | trim
                  | regex_findall(':(?:v)?(\d+\.\d+\.\d+)')
                  | first
                  | default('')
                )
                or (
                  cilium_version.stdout | default('')
                  | regex_findall('cilium image \(running\):[^\n]*?(?:/|:)(?:v)?(\d+\.\d+\.\d+)')
                  | first
                  | default('')
                )
                or (
                  cilium_version.stdout | default('')
                  | regex_findall('cilium image \(running\):\s*v?(\d+\.\d+\.\d+)')
                  | first
                  | default('')
                )
                or (
                  cilium_version.stdout | default('')
                  | regex_findall('cilium image \(default\):\s*v?(\d+\.\d+\.\d+)')
                  | first
                  | default('')
                )
                or (
                  cilium_version.stdout | default('')
                  | regex_findall('cilium image.+?(\d+\.\d+\.\d+)')
                  | first
                  | default('')
                )
                or (
                  cilium_version.stdout | default('')
                  | regex_findall('image[^\n:]*:\s*\S+:(?:v)?(\d+\.\d+\.\d+)')
                  | first
                  | default('')
                )
                or 'unknown'
              }}

        - name: Fail if installed Cilium version cannot be parsed
          ansible.builtin.fail:
            msg: >-
              Could not parse Cilium version from the cilium DaemonSet image or `cilium version`.
              Check `kubectl -n kube-system get ds cilium -o yaml` (image tag) and cluster connectivity.
          when: installed_cilium_version == 'unknown'

        # Full tag mismatch => reconcile with cilium upgrade/install. Preflight + upgradeCompatibility
        # only when crossing major/minor vs target; patch-only (e.g. 1.19.1 -> v1.19.2) skips that path.
        # Same set_fact cannot reference sibling keys (e.g. cilium_needs_update must not use *_normalized).
        - name: Derive Cilium update flags from installed vs target tag
          ansible.builtin.set_fact:
            cilium_installed_tag_normalized: "v{{ installed_cilium_version | regex_replace('^v', '') }}"
            cilium_target_tag_normalized: "v{{ cilium_tag | regex_replace('^v', '') }}"
            cilium_needs_update: >-
              {{
                ('v' ~ (installed_cilium_version | regex_replace('^v', '') | trim))
                !=
                ('v' ~ (cilium_tag | regex_replace('^v', '') | trim))
              }}
            _cilium_installed_sv: "{{ installed_cilium_version | regex_replace('^v', '') }}"
            _cilium_target_sv: "{{ cilium_tag | regex_replace('^v', '') }}"

        - name: Classify patch-only change within target major.minor
          ansible.builtin.set_fact:
            cilium_patch_only_vs_target: >-
              {{
                cilium_needs_update | bool
                and (
                  _cilium_installed_sv is version(_cilium_target_mm_floor, '>=')
                  and _cilium_installed_sv is version(_cilium_target_mm_next, '<')
                )
              }}
          vars:
            _tp: "{{ _cilium_target_sv.split('.') }}"
            _cilium_target_mm_floor: "{{ _tp[0] }}.{{ _tp[1] }}.0"
            _cilium_target_mm_next: "{{ _tp[0] }}.{{ (_tp[1] | int + 1) }}.0"

        - name: Set preflight/minor-upgrade flag (not patch-only)
          ansible.builtin.set_fact:
            cilium_is_upgrade: "{{ cilium_needs_update | bool and not (cilium_patch_only_vs_target | default(false) | bool) }}"

    - name: Set Cilium chart semver facts
      ansible.builtin.set_fact:
        cilium_chart_version: "{{ cilium_tag | regex_replace('^v', '') }}"
        cilium_target_ge_119: "{{ (cilium_tag | regex_replace('^v', '')) is version('1.19.0', '>=') }}"

    - name: Log Cilium upgrade state
      ansible.builtin.debug:
        msg: >-
          present={{ cilium_present }}, needs_update={{ cilium_needs_update }},
          is_preflight_minor_upgrade={{ cilium_is_upgrade }},
          patch_only_vs_target={{ cilium_patch_only_vs_target | default(false) }},
          installed={{ installed_cilium_version | default('n/a') }}, target={{ cilium_tag }}

    - name: Reject legacy BGP API when targeting Cilium 1.19+
      ansible.builtin.fail:
        msg: >-
          cilium_bgp_api_version v2alpha1 (CiliumBGPPeeringPolicy) is removed in Cilium 1.19+.
          Set cilium_bgp_api_version to v2 and migrate CRDs before upgrading.
          See https://docs.cilium.io/en/v1.19/operations/upgrade/#upgrade-notes
      when:
        - cilium_target_ge_119 | bool
        - (cilium_bgp_api_version | default('v2') | trim) == 'v2alpha1'

    - name: List CiliumBGPPeeringPolicy resources when targeting Cilium 1.19+
      ansible.builtin.command: >-
        {{ k3s_kubectl_binary | default('k3s kubectl') }} get ciliumbgppeeringpolicies.cilium.io -o name --ignore-not-found
      register: cilium_bgpv1_policy_list
      changed_when: false
      failed_when: false
      when: cilium_target_ge_119 | bool

    - name: Fail if CiliumBGPPeeringPolicy CRs still exist
      ansible.builtin.fail:
        msg: >-
          CiliumBGPPeeringPolicy resources are present but BGPv1 is removed in Cilium 1.19+.
          Delete or migrate them to BGP v2 CRDs, then retry.
          See https://docs.cilium.io/en/v1.19/operations/upgrade/#upgrade-notes
      when:
        - cilium_target_ge_119 | bool
        - cilium_bgpv1_policy_list is defined
        - cilium_bgpv1_policy_list.rc == 0
        - (cilium_bgpv1_policy_list.stdout | default('') | trim | length) > 0

    - name: Check CiliumLoadBalancerIPPool stored apiVersion when targeting Cilium 1.19+
      when: cilium_target_ge_119 | bool
      block:
        - name: List CiliumLoadBalancerIPPool CRs as JSON
          ansible.builtin.command: >-
            {{ k3s_kubectl_binary | default('k3s kubectl') }} get ciliumloadbalancerippools.cilium.io -o json
          register: cilium_lbpool_json
          changed_when: false
          failed_when: false

        - name: Set flag if any pool is still stored as v2alpha1
          ansible.builtin.set_fact:
            cilium_lbpool_has_v2alpha1: >-
              {{
                (
                  (
                    (cilium_lbpool_json.stdout | from_json)
                    .get('items', [])
                    | map(attribute='apiVersion')
                    | select('regex', 'v2alpha1')
                    | list
                    | length > 0
                  )
                  if cilium_lbpool_json.rc == 0
                  else false
                )
              }}

    - name: Fail if CiliumLoadBalancerIPPool resources use v2alpha1 apiVersion
      ansible.builtin.fail:
        msg: >-
          One or more CiliumLoadBalancerIPPool objects are still apiVersion cilium.io/v2alpha1.
          Migrate them to cilium.io/v2 (re-apply v2 manifests or patch) before upgrading to Cilium 1.19+.
          See https://docs.cilium.io/en/v1.19/operations/upgrade/#custom-resource-versions
      when:
        - cilium_target_ge_119 | bool
        - cilium_lbpool_has_v2alpha1 | default(false) | bool

    - name: Validate consecutive minor upgrade path
      when: cilium_is_upgrade | bool
      ansible.builtin.assert:
        that:
          - (cilium_chart_version.split('.') | length) >= 2
          - (installed_cilium_version.split('.') | length) >= 2
          - (cilium_chart_version.split('.')[0] | int) == (installed_cilium_version.split('.')[0] | int)
          - >-
            ((cilium_chart_version.split('.')[1] | int) - (installed_cilium_version.split('.')[1] | int)) <= 1
          - >-
            ((cilium_chart_version.split('.')[1] | int) - (installed_cilium_version.split('.')[1] | int)) >= 0
        fail_msg: >-
          Cilium supports upgrading at most one minor release at a time (see
          https://docs.cilium.io/en/v1.19/operations/upgrade/ ).
          Installed: {{ installed_cilium_version }}, target chart: {{ cilium_chart_version }}.

    - name: Set Helm upgradeCompatibility for upgrade path
      ansible.builtin.set_fact:
        cilium_upgrade_compatibility_helm: >-
          {{
            (cilium_upgrade_compatibility_override | default('') | trim)
            if (cilium_upgrade_compatibility_override | default('') | trim | length) > 0
            else (installed_cilium_version.split('.')[0] ~ '.' ~ installed_cilium_version.split('.')[1])
          }}
      when:
        - cilium_is_upgrade | bool
        - installed_cilium_version | default('') | length > 0
        - installed_cilium_version != 'unknown'

    - name: Ensure Helm is available for Cilium preflight
      when: cilium_is_upgrade | bool
      block:
        - name: Check for helm binary
          ansible.builtin.command: helm version
          register: cilium_helm_check
          failed_when: false
          changed_when: false

        - name: Set Helm architecture
          ansible.builtin.set_fact:
            cilium_helm_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"
          when: cilium_helm_check.rc != 0

        - name: Download Helm
          ansible.builtin.get_url:
            url: "https://get.helm.sh/helm-v{{ cilium_helm_version }}-linux-{{ cilium_helm_arch }}.tar.gz"
            dest: "/tmp/k3s/helm-v{{ cilium_helm_version }}-linux-{{ cilium_helm_arch }}.tar.gz"
            mode: "0644"
          when: cilium_helm_check.rc != 0

        - name: Extract Helm binary to tmp
          ansible.builtin.shell: |
            set -euo pipefail
            rm -f /tmp/k3s/helm
            tar -xzf "/tmp/k3s/helm-v{{ cilium_helm_version }}-linux-{{ cilium_helm_arch }}.tar.gz" \
              -C /tmp/k3s \
              --strip-components=1 \
              "linux-{{ cilium_helm_arch }}/helm"
          args:
            executable: /bin/bash
          when: cilium_helm_check.rc != 0
          changed_when: true

        - name: Copy Helm into PATH
          ansible.builtin.copy:
            src: /tmp/k3s/helm
            dest: /usr/local/bin/helm
            mode: "0755"
            remote_src: true
          when: cilium_helm_check.rc != 0

    - name: Run Cilium Helm preflight before upgrade
      when: cilium_is_upgrade | bool
      environment:
        KUBECONFIG: "{{ ansible_user_dir }}/.kube/config"
      block:
        - name: Render Cilium preflight manifest
          ansible.builtin.shell: |
            set -euo pipefail
            helm template cilium-preflight oci://quay.io/cilium/charts/cilium \
              --version "{{ cilium_chart_version }}" \
              --namespace kube-system \
              --set preflight.enabled=true \
              --set agent=false \
              --set operator.enabled=false \
            {% if kube_proxy_replacement | default(true) | bool %}
              --set k8sServiceHost=127.0.0.1 \
              --set k8sServicePort=6444 \
            {% endif %}
              > /tmp/k3s/cilium-preflight.yaml
          args:
            executable: /bin/bash
          changed_when: true

        - name: Remove stale Cilium preflight resources
          ansible.builtin.command: >-
            {{ k3s_kubectl_binary | default('k3s kubectl') }} delete -f /tmp/k3s/cilium-preflight.yaml --ignore-not-found
          register: cilium_preflight_delete
          changed_when: "'deleted' in cilium_preflight_delete.stdout | lower"
          failed_when: false

        - name: Apply and verify Cilium preflight (rollout + cleanup)
          block:
            - name: Apply Cilium preflight manifest
              ansible.builtin.command: >-
                {{ k3s_kubectl_binary | default('k3s kubectl') }} apply -f /tmp/k3s/cilium-preflight.yaml
              register: cilium_preflight_apply
              changed_when: "'configured' in cilium_preflight_apply.stdout or 'created' in cilium_preflight_apply.stdout"

            - name: Wait for Cilium preflight DaemonSet rollout
              ansible.builtin.command: >-
                {{ k3s_kubectl_binary | default('k3s kubectl') }} rollout status daemonset/cilium-pre-flight-check
                -n kube-system --timeout={{ cilium_preflight_rollout_timeout }}
              changed_when: false

            - name: Wait for Cilium preflight Deployment availability
              ansible.builtin.command: >-
                {{ k3s_kubectl_binary | default('k3s kubectl') }} rollout status deployment/cilium-pre-flight-check
                -n kube-system --timeout={{ cilium_preflight_rollout_timeout }}
              changed_when: false

            - name: Delete Cilium preflight manifest from cluster
              ansible.builtin.command: >-
                {{ k3s_kubectl_binary | default('k3s kubectl') }} delete -f /tmp/k3s/cilium-preflight.yaml --ignore-not-found
              register: cilium_preflight_cleanup
              changed_when: "'deleted' in cilium_preflight_cleanup.stdout | lower"
              failed_when: false

          rescue:
            - name: Remove Cilium preflight resources after failed rollout
              ansible.builtin.command: >-
                {{ k3s_kubectl_binary | default('k3s kubectl') }} delete -f /tmp/k3s/cilium-preflight.yaml --ignore-not-found
              changed_when: false
              failed_when: false

            - name: Fail with preflight error context
              ansible.builtin.fail:
                msg: >-
                  Cilium Helm preflight failed (apply or rollout). Preflight objects were deleted where possible.
                  Fix CNP/policy issues per https://docs.cilium.io/en/v1.19/operations/upgrade/#cnp-validation then retry.
                  Error: {{ ansible_failed_result.msg | default('see task output above') }}

    - name: Install or upgrade Cilium
      ansible.builtin.command: >-
        {% if cilium_installed.rc != 0 %}
        cilium install
        {% else %}
        cilium upgrade
        {% endif %}
        --version "{{ cilium_tag }}"
        --helm-set operator.replicas="1"
        {{ '--helm-set devices=' + cilium_iface if cilium_iface != 'auto' else '' }}
        --helm-set ipam.operator.clusterPoolIPv4PodCIDRList={{ cluster_cidr }}
        {% if cilium_mode == "native" or (cilium_bgp and cilium_exportPodCIDR != 'false') %}
        --helm-set ipv4NativeRoutingCIDR={{ cluster_cidr }}
        {% endif %}
        --helm-set k8sServiceHost="127.0.0.1"
        --helm-set k8sServicePort="6444"
        --helm-set routingMode={{ cilium_mode }}
        --helm-set autoDirectNodeRoutes={{ "true" if cilium_mode == "native" else "false" }}
        --helm-set kubeProxyReplacement={{ kube_proxy_replacement }}
        --helm-set bpf.masquerade={{ enable_bpf_masquerade }}
        --helm-set bgpControlPlane.enabled={{ cilium_bgp | default("false") }}
        --helm-set hubble.enabled={{ "true" if cilium_hubble else "false" }}
        --helm-set hubble.relay.enabled={{ "true" if cilium_hubble else "false" }}
        --helm-set hubble.ui.enabled={{ "true" if cilium_hubble else "false" }}
        {% if kube_proxy_replacement is not false %}
        --helm-set bpf.loadBalancer.algorithm={{ bpf_lb_algorithm }}
        --helm-set bpf.loadBalancer.mode={{ bpf_lb_mode }}
        --helm-set gatewayAPI.enabled=true
        {% endif %}
        {% if cilium_is_upgrade | default(false) | bool %}
        {% if cilium_upgrade_compatibility_helm is defined %}
        --helm-set upgradeCompatibility={{ cilium_upgrade_compatibility_helm | trim }}
        {% endif %}
        {% endif %}
      environment:
        KUBECONFIG: "{{ ansible_user_dir }}/.kube/config"
      register: cilium_install_result
      changed_when: cilium_install_result.rc == 0
      when: cilium_needs_update | default(true) | bool

    - name: Wait for Cilium resources
      ansible.builtin.command: >-
        {% if item.type == 'daemonset' %}
        {{ k3s_kubectl_binary | default('k3s kubectl') }} wait pods
        --namespace=kube-system
        --selector='k8s-app=cilium'
        --for=condition=Ready
        {% else %}
        {{ k3s_kubectl_binary | default('k3s kubectl') }} wait {{ item.type }}/{{ item.name }}
        --namespace=kube-system
        --for=condition=Available
        {% endif %}
        --timeout=30s
      register: cr_result
      changed_when: false
      until: cr_result is succeeded
      retries: 30
      delay: 7
      with_items:
        - { name: cilium-operator, type: deployment }
        - { name: cilium, type: daemonset, selector: k8s-app=cilium }
        - { name: hubble-relay, type: deployment, check_hubble: true }
        - { name: hubble-ui, type: deployment, check_hubble: true }
      loop_control:
        label: "{{ item.type }}/{{ item.name }}"
      when: >-
        not item.check_hubble | default(false) or (item.check_hubble | default(false) and cilium_hubble)

    - name: Configure Cilium BGP
      when: cilium_bgp
      block:
        - name: Set _cilium_bgp_neighbors fact
          ansible.builtin.set_fact:
            _cilium_bgp_neighbors: "{{ lookup('community.general.merge_variables', '^cilium_bgp_neighbors__.+$', initial_value=cilium_bgp_neighbors, groups=cilium_bgp_neighbors_groups) }}"  # yamllint disable-line rule:line-length

        - name: Debug BGP API version
          ansible.builtin.debug:
            msg: "cilium_bgp_api_version is set to: '{{ cilium_bgp_api_version | default('NOT SET') }}'"

        - name: Copy BGP manifests (v2 API) to first master
          ansible.builtin.template:
            src: cilium-bgp-v2.crs.j2
            dest: /tmp/k3s/cilium-bgp.yaml
            owner: root
            group: root
            mode: "0755"
          when: (cilium_bgp_api_version | default('v2') | trim) == 'v2'

        - name: Copy BGP manifests (v2alpha1 API - legacy) to first master
          ansible.builtin.template:
            src: cilium.crs.j2
            dest: /tmp/k3s/cilium-bgp.yaml
            owner: root
            group: root
            mode: "0755"
          when: (cilium_bgp_api_version | default('v2') | trim) == 'v2alpha1'

        - name: Apply BGP manifests
          ansible.builtin.command:
            cmd: "{{ k3s_kubectl_binary | default('k3s kubectl') }} apply -f /tmp/k3s/cilium-bgp.yaml"
          register: apply_cr
          changed_when: "'configured' in apply_cr.stdout or 'created' in apply_cr.stdout"

        - name: Test for BGP config resources (v2 API)
          ansible.builtin.command: "{{ item }}"
          loop:
            - "{{ k3s_kubectl_binary | default('k3s kubectl') }} get CiliumBGPClusterConfig.cilium.io"
            - "{{ k3s_kubectl_binary | default('k3s kubectl') }} get CiliumBGPPeerConfig.cilium.io"
            - "{{ k3s_kubectl_binary | default('k3s kubectl') }} get CiliumBGPAdvertisement.cilium.io"
            - "{{ k3s_kubectl_binary | default('k3s kubectl') }} get CiliumLoadBalancerIPPool.cilium.io"
          changed_when: false
          loop_control:
            label: "{{ item }}"
          when: (cilium_bgp_api_version | default('v2') | trim) == 'v2'

        - name: Test for BGP config resources (v2alpha1 API - legacy)
          ansible.builtin.command: "{{ item }}"
          loop:
            - "{{ k3s_kubectl_binary | default('k3s kubectl') }} get CiliumBGPPeeringPolicy.cilium.io"
            - "{{ k3s_kubectl_binary | default('k3s kubectl') }} get CiliumLoadBalancerIPPool.cilium.io"
          changed_when: false
          loop_control:
            label: "{{ item }}"
          when: (cilium_bgp_api_version | default('v2') | trim) == 'v2alpha1'
