---
- name: Build BGP nodeSelector matchExpressions from envoy exclude labels
  ansible.builtin.set_fact:
    _cilium_bgp_exclude_exprs: "{{ _cilium_bgp_exclude_exprs | default([]) + [_bgp_expr_item] }}"
  vars:
    _bgp_expr_item:
      key: "{{ item.key }}"
      operator: NotIn
      values:
        - "{{ item.value | string | lower }}"
  loop: "{{ cilium_envoy_exclude_node_labels | dict2items }}"
  when:
    - (cilium_bgp_node_selector | default({}) | length) == 0
    - cilium_envoy_exclude_node_labels | default({}) | length > 0

- name: Set effective BGP cluster nodeSelector for BGP manifest template
  ansible.builtin.set_fact:
    _cilium_bgp_cluster_node_selector: >-
      {{
        cilium_bgp_node_selector
        if (cilium_bgp_node_selector | default({}) | length > 0)
        else (
          {'matchExpressions': _cilium_bgp_exclude_exprs | default([])}
          if (_cilium_bgp_exclude_exprs | default([]) | length > 0)
          else {}
        )
      }}
